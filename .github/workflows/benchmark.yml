name: AI Multi-Model Benchmark

on:
  workflow_dispatch:
    inputs:
      model_group:
        description: "Which models to run"
        required: true
        default: "small"
        type: choice
        options:
          - small
          - medium
          - large
          - mistral
          - all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark-small:
    if: ${{ github.event.inputs.model_group == 'small' || github.event.inputs.model_group == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [tinyllama-1.1b, llama-3.2-1b, deepseek-r1-1.5b, gemma-2-2b]
    name: "${{ matrix.model }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-llama-cpp-v1
      - uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ matrix.model }}-v1
      - run: pip install llama-cpp-python
      - run: python benchmark.py --model ${{ matrix.model }}
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: results/${{ matrix.model }}.json

  benchmark-medium:
    if: ${{ github.event.inputs.model_group == 'medium' || github.event.inputs.model_group == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [llama-3.2-3b, qwen-2.5-3b, phi-3-mini, phi-3.5-mini, phi-4-mini]
    name: "${{ matrix.model }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-llama-cpp-v1
      - uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ matrix.model }}-v1
      - run: pip install llama-cpp-python
      - run: python benchmark.py --model ${{ matrix.model }}
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: results/${{ matrix.model }}.json

  benchmark-large:
    if: ${{ github.event.inputs.model_group == 'large' || github.event.inputs.model_group == 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [mistral-7b-v02, mistral-7b-v03, qwen-2.5-7b, deepseek-r1-7b, llama-3.1-8b, gemma-2-9b]
    name: "${{ matrix.model }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-llama-cpp-v1
      - uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ matrix.model }}-v1
      - run: pip install llama-cpp-python
      - run: python benchmark.py --model ${{ matrix.model }}
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: results/${{ matrix.model }}.json

  benchmark-mistral:
    if: ${{ github.event.inputs.model_group == 'mistral' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model: [mistral-7b-v02, mistral-7b-v03, mistral-nemo-12b]
    name: "${{ matrix.model }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-llama-cpp-v1
      - uses: actions/cache@v4
        with:
          path: models/
          key: model-${{ matrix.model }}-v1
      - run: pip install llama-cpp-python
      - run: python benchmark.py --model ${{ matrix.model }}
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.model }}
          path: results/${{ matrix.model }}.json

  report:
    needs: [benchmark-small, benchmark-medium, benchmark-large, benchmark-mistral]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          path: results/
          pattern: result-*
          merge-multiple: true
      - name: Generate HTML report
        run: python report.py
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: results/report.html
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: all-results-json
          path: results/
          retention-days: 30